# GitHub Actions CI/CD 工作流
# GitHub Actions CI/CD Workflow for 衍智体 (YANZHITI)

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ==================== 代码质量检查 | Code Quality ====================
  lint:
    name: 🔍 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python | Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装依赖 | Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov
          pip install -e .[dev]

      - name: Ruff 检查 | Ruff linting
        run: |
          ruff check src/ --output-format=github
          ruff format --check --diff src/

      - name: MyPy 类型检查 | Type checking
        run: mypy src/ --ignore-missing-imports || true

  # ==================== 单元测试 | Unit Tests ====================
  test:
    name: 🧪 单元测试 (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装依赖 | Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install -e .[dev]

      - name: 运行测试 | Run tests
        run: |
          pytest tests/ -v --cov=src/yanzhiti --cov-report=xml --cov-report=html --cov-report=term-missing

      - name: 上传覆盖率报告 | Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: htmlcov/

  # ==================== 构建分发包 | Build Distribution ====================
  build:
    name: 📦 构建 (Python 3.11)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python | Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装构建工具 | Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: 构建 PyPI 包 | Build PyPI package
        run: python -m build

      - name: 上传构建产物 | Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ==================== 发布到 PyPI | Publish to PyPI ====================
  publish-pypi:
    name: 🚀 发布到 PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python | Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 安装发布工具 | Install publish tools
        run: pip install twine

      - name: 下载构建产物 | Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: 发布到 PyPI | Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  # ==================== 创建 GitHub Release | Create GitHub Release ====================
  release:
    name: 🎉 创建 Release
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 获取版本号 | Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: 生成 Changelog | Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD~20..HEAD)
          echo "CHANGELOG<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: 创建 Release | Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "衍智体 YANZHITI v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🎉 衍智体 (YANZHITI) v${{ steps.version.outputs.VERSION }}

            ### ✨ 新功能 | New Features
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### 📦 安装 | Installation

            ```bash
            pip install yanzhiti
            ```

            ### 🚀 快速开始 | Quick Start

            ```bash
            yzt --setup   # 配置向导
            yzt          # 启动交互模式
            yzt --gui     # 启动 Web 界面
            ```

            ### 🌐 在线文档 | Documentation
            - [README](https://github.com/yanzhiti/yanzhiti#readme)
            - [快速入门](https://github.com/yanzhiti/yanzhiti/blob/main/docs/QUICKSTART.md)
            - [完整文档](https://github.com/yanzhiti/yanzhiti/tree/main/docs)

            ---
            **感谢使用衍智体！| Thank you for using YANZHITI!** ⭐
          files: dist/*
          draft: false
          prerelease: false

  # ==================== 部署文档 | Deploy Docs ====================
  docs:
    name: 📖 部署文档
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: 部署到 GitHub Pages | Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
