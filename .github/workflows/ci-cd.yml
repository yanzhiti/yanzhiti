# GitHub Actions CI/CD е·ҘдҪңжө?
# GitHub Actions CI/CD Workflow for иЎҚжҷәдҪ?(YANZHITI)

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ==================== д»Јз ҒиҙЁйҮҸжЈҖжҹ?| Code Quality ====================
  lint:
    name: рҹ”Қ д»Јз ҒиҙЁйҮҸжЈҖжҹ?
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: и®ҫзҪ® Python | Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: е®үиЈ…дҫқиө– | Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-cov
          pip install -e .[dev]

      - name: Ruff жЈҖжҹ?| Ruff linting
        run: |
          ruff check src/ --output-format=github
          ruff format --check --diff src/

      - name: MyPy зұ»еһӢжЈҖжҹ?| Type checking
        run: mypy src/ --ignore-missing-imports || true

  # ==================== еҚ•е…ғжөӢиҜ• | Unit Tests ====================
  test:
    name: рҹ§Ә еҚ•е…ғжөӢиҜ• (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
      fail-fast: false

    steps:
      - uses: actions/checkout@v5

      - name: и®ҫзҪ® Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: е®үиЈ…дҫқиө– | Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio
          pip install -e .[dev]

      - name: иҝҗиЎҢжөӢиҜ• | Run tests
        run: |
          pytest tests/ -v --cov=src/yanzhiti --cov-report=xml --cov-report=html --cov-report=term-missing

      - name: дёҠдј иҰҶзӣ–зҺҮжҠҘе‘?| Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: htmlcov/

  # ==================== жһ„е»әеҲҶеҸ‘еҢ?| Build Distribution ====================
  build:
    name: рҹ“Ұ жһ„е»ә (Python 3.11)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v5

      - name: и®ҫзҪ® Python | Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: е®үиЈ…жһ„е»әе·Ҙе…· | Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: жһ„е»ә PyPI еҢ?| Build PyPI package
        run: python -m build

      - name: дёҠдј жһ„е»әдә§зү© | Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ==================== еҸ‘еёғеҲ?PyPI | Publish to PyPI ====================
  publish-pypi:
    name: рҹҡҖ еҸ‘еёғеҲ?PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v5

      - name: и®ҫзҪ® Python | Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: е®үиЈ…еҸ‘еёғе·Ҙе…· | Install publish tools
        run: pip install twine

      - name: дёӢиҪҪжһ„е»әдә§зү© | Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: еҸ‘еёғеҲ?PyPI | Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  # ==================== еҲӣе»ә GitHub Release | Create GitHub Release ====================
  release:
    name: рҹҺү еҲӣе»ә Release
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: иҺ·еҸ–зүҲжң¬еҸ?| Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: з”ҹжҲҗ Changelog | Generate changelog
        id: changelog
        run: |
          CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD~20..HEAD)
          echo "CHANGELOG<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: еҲӣе»ә Release | Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "иЎҚжҷәдҪ?YANZHITI v${{ steps.version.outputs.VERSION }}"
          body: |
            ## рҹҺү иЎҚжҷәдҪ?(YANZHITI) v${{ steps.version.outputs.VERSION }}

            ### вң?ж–°еҠҹиғ?| New Features
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### рҹ“Ұ е®үиЈ… | Installation

            ```bash
            pip install yanzhiti
            ```

            ### рҹҡҖ еҝ«йҖҹејҖе§?| Quick Start

            ```bash
            yzt --setup   # й…ҚзҪ®еҗ‘еҜј
            yzt          # еҗҜеҠЁдәӨдә’жЁЎејҸ
            yzt --gui     # еҗҜеҠЁ Web з•Ңйқў
            ```

            ### рҹҢҗ еңЁзәҝж–ҮжЎЈ | Documentation
            - [README](https://github.com/yanzhiti/yanzhiti#readme)
            - [еҝ«йҖҹе…Ҙй—Ё](https://github.com/yanzhiti/yanzhiti/blob/main/docs/QUICKSTART.md)
            - [е®Ңж•ҙж–ҮжЎЈ](https://github.com/yanzhiti/yanzhiti/tree/main/docs)

            ---
            **ж„ҹи°ўдҪҝз”ЁиЎҚжҷәдҪ“пјҒ| Thank you for using YANZHITI!** вӯ?
          files: dist/*
          draft: false
          prerelease: false

  # ==================== йғЁзҪІж–ҮжЎЈ | Deploy Docs ====================
  docs:
    name: рҹ“– йғЁзҪІж–ҮжЎЈ
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v5

      - name: йғЁзҪІеҲ?GitHub Pages | Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages

