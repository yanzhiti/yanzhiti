<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <!-- 背景渐变 | Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <!-- 终端渐变 | Terminal gradient -->
    <linearGradient id="termGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <!-- 紫色渐变 | Purple gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <!-- 绿色渐变 | Green gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <!-- 蓝色渐变 | Blue gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <!-- 阴影 | Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- 发光效果 | Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 | Background -->
  <rect width="900" height="520" fill="url(#bgGrad)" rx="16"/>

  <!-- 装饰网格线 | Decorative grid lines -->
  <g opacity="0.05" stroke="#fff" stroke-width="1">
    <line x1="0" y1="130" x2="900" y2="130"/>
    <line x1="0" y1="260" x2="900" y2="260"/>
    <line x1="0" y1="390" x2="900" y2="390"/>
    <line x1="225" y1="0" x2="225" y2="520"/>
    <line x1="450" y1="0" x2="450" y2="520"/>
    <line x1="675" y1="0" x2="675" y2="520"/>
  </g>

  <!-- 标题区域 | Title area -->
  <text x="450" y="52" text-anchor="middle" font-family="Inter,sans-serif" font-size="28" font-weight="800" fill="white">
    衍智体 YANZHITI
  </text>
  <text x="450" y="76" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" fill="#94a3b8">
    AI 智能编程助手 · 17+ AI 供应商 · 开箱即用 · 隐私优先
  </text>

  <!-- 左侧：CLI 终端 | Left: CLI Terminal -->
  <g transform="translate(20, 95)" filter="url(#shadow)">
    <!-- 终端窗口 | Terminal window -->
    <rect width="410" height="340" rx="12" fill="url(#termGrad)" stroke="#334155" stroke-width="1"/>

    <!-- 终端标题栏 | Terminal title bar -->
    <rect width="410" height="36" rx="12" fill="#1e293b"/>
    <rect y="24" width="410" height="12" fill="#1e293b"/>
    <!-- 窗口按钮 | Window buttons -->
    <circle cx="20" cy="18" r="6" fill="#ef4444"/>
    <circle cx="40" cy="18" r="6" fill="#f59e0b"/>
    <circle cx="60" cy="18" r="6" fill="#10b981"/>
    <text x="205" y="23" text-anchor="middle" font-family="monospace" font-size="12" fill="#64748b">bash — yzt</text>

    <!-- 终端内容 | Terminal content -->
    <g font-family="'Cascadia Code','Fira Code',monospace" font-size="12" fill="#e2e8f0">
      <!-- Prompt 1 -->
      <text x="12" y="64" fill="#10b981">❯</text>
      <text x="28" y="64" fill="#f1f5f9">yzt --setup</text>

      <!-- 输出 1 -->
      <text x="12" y="84" fill="#6366f1">🤖 衍智体配置向导</text>
      <text x="12" y="100" fill="#94a3b8">请选择 AI 供应商模式：</text>
      <text x="12" y="116" fill="#fbbf24">  [1] ☁️ 云端模式 (推荐)</text>
      <text x="12" y="130" fill="#94a3b8">  [2] 🖥️ 本地模式 (Ollama/LM Studio)</text>
      <text x="12" y="144" fill="#94a3b8">  [3] 🔧 内置模式 (无需配置)</text>
      <text x="12" y="164" fill="#34d399">→ 请输入选项 (1/2/3):</text>
      <rect x="12" y="170" width="6" height="14" fill="#10b981"/>

      <!-- Prompt 2 -->
      <text x="12" y="206" fill="#10b981">❯</text>
      <text x="28" y="206" fill="#f1f5f9">yzt "帮我写一个快速排序"</text>

      <!-- 输出 2 -->
      <text x="12" y="226" fill="#6366f1">⏳ 正在思考...</text>
      <text x="12" y="244" fill="#e2e8f0">```python</text>
      <text x="12" y="258" fill="#a78bfa">def</text>
      <text x="44" y="258" fill="#e2e8f0">quick_sort(arr):</text>
      <text x="24" y="272" fill="#a78bfa">if</text>
      <text x="44" y="272" fill="#e2e8f0">len(arr) &lt;= </text>
      <text x="104" y="272" fill="#f472b6">1</text>
      <text x="112" y="272" fill="#e2e8f0">:</text>
      <text x="24" y="286" fill="#e2e8f0">    </text>
      <text x="36" y="286" fill="#a78bfa">return</text>
      <text x="84" y="286" fill="#e2e8f0">arr</text>
      <text x="12" y="304" fill="#e2e8f0">```</text>
      <text x="12" y="320" fill="#34d399">✅ 已复制到剪贴板</text>
    </g>
  </g>

  <!-- 中间装饰 | Center decoration -->
  <g transform="translate(450, 265)" opacity="0.6">
    <circle r="24" fill="none" stroke="url(#purpleGrad)" stroke-width="2" stroke-dasharray="4 4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </circle>
    <text y="5" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="bold" fill="#6366f1">Y</text>
  </g>

  <!-- 右侧：Web GUI | Right: Web GUI -->
  <g transform="translate(470, 95)" filter="url(#shadow)">
    <!-- GUI 窗口 | GUI window -->
    <rect width="410" height="340" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>

    <!-- GUI 标题栏 | GUI title bar -->
    <rect width="410" height="36" rx="12" fill="#1e293b"/>
    <rect y="24" width="410" height="12" fill="#1e293b"/>
    <!-- Logo -->
    <rect x="12" y="8" width="20" height="20" rx="4" fill="url(#purpleGrad)"/>
    <text x="22" y="23" text-anchor="middle" font-family="Inter,sans-serif" font-size="10" font-weight="bold" fill="white">Y</text>
    <text x="44" y="24" font-family="Inter,sans-serif" font-size="12" font-weight="600" fill="#f1f5f9">衍智体</text>
    <!-- 最小化/关闭按钮 | Minimize/Close buttons -->
    <circle cx="374" cy="18" r="5" fill="#475569"/>
    <circle cx="390" cy="18" r="5" fill="#475569"/>

    <!-- 模型选择器 | Model selector -->
    <rect x="12" y="46" width="180" height="28" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
    <text x="22" y="64" font-family="Inter,sans-serif" font-size="11" fill="#94a3b8">OpenRouter / GPT-4o</text>
    <text x="172" y="64" text-anchor="end" font-family="Inter,sans-serif" font-size="10" fill="#10b981">🆓 免费</text>
    <circle cx="180" cy="60" r="6" fill="#334155"/>
    <path d="M176,60 L180,64 L184,60" fill="none" stroke="#64748b" stroke-width="1.5"/>

    <!-- 聊天区域 | Chat area -->
    <g transform="translate(0, 86)">
      <!-- 用户消息 | User message -->
      <g transform="translate(220, 8)">
        <rect width="180" height="44" rx="12" fill="#6366f1"/>
        <text x="12" y="20" font-family="Inter,sans-serif" font-size="12" fill="white">帮我解释这段代码的作用</text>
        <text x="12" y="34" font-family="Inter,sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">12:34</text>
      </g>

      <!-- AI 消息 | AI message -->
      <g transform="translate(8, 64)">
        <rect width="300" height="90" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1"/>
        <rect x="12" y="12" width="24" height="24" rx="12" fill="url(#purpleGrad)"/>
        <text x="24" y="28" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" font-weight="bold" fill="white">🤖</text>
        <text x="48" y="26" font-family="Inter,sans-serif" font-size="12" font-weight="500" fill="#f1f5f9">衍智体助手</text>
        <text x="48" y="42" font-family="Inter,sans-serif" font-size="11" fill="#94a3b8">这是一个</text>
        <text x="80" y="42" font-family="Inter,sans-serif" font-size="11" fill="#a78bfa">Python</text>
        <text x="118" y="42" font-family="Inter,sans-serif" font-size="11" fill="#94a3b8">函数...</text>
        <rect x="48" y="54" width="240" height="24" rx="6" fill="#1e293b"/>
        <text x="56" y="69" font-family="'Cascadia Code',monospace" font-size="10" fill="#10b981">def example(x):</text>
        <text x="12" y="82" font-family="Inter,sans-serif" font-size="10" fill="#64748b">12:35</text>
      </g>

      <!-- 加载动画 | Loading animation -->
      <g transform="translate(20, 166)">
        <circle cx="0" cy="0" r="4" fill="#6366f1"><animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/></circle>
        <circle cx="14" cy="0" r="4" fill="#a855f7"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/></circle>
        <circle cx="28" cy="0" r="4" fill="#6366f1"><animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- 输入框 | Input area -->
    <g transform="translate(12, 332)">
      <rect width="386" height="36" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
      <text x="12" y="23" font-family="Inter,sans-serif" font-size="12" fill="#475569">输入您的问题...</text>
      <rect x="344" y="8" width="34" height="20" rx="6" fill="#6366f1"/>
      <text x="361" y="22" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="white">发送</text>
    </g>
  </g>

  <!-- 底部标签 | Bottom badges -->
  <g transform="translate(0, 452)">
    <rect x="80" y="0" width="120" height="28" rx="14" fill="#064e3b"/>
    <text x="140" y="18" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#34d399">✅ 17+ AI 供应商</text>

    <rect x="220" y="0" width="120" height="28" rx="14" fill="#1e3a5f"/>
    <text x="280" y="18" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#60a5fa">☁️ 本地 + 云端</text>

    <rect x="360" y="0" width="120" height="28" rx="14" fill="#4c1d95"/>
    <text x="420" y="18" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#c4b5fd">🔒 隐私优先</text>

    <rect x="500" y="0" width="120" height="28" rx="14" fill="#064e3b"/>
    <text x="560" y="18" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#34d399">📦 pip install</text>

    <rect x="640" y="0" width="180" height="28" rx="14" fill="#1e3a5f"/>
    <text x="730" y="18" text-anchor="middle" font-family="Inter,sans-serif" font-size="11" fill="#60a5fa">🪟 Windows / Mac / Linux</text>
  </g>
</svg>
